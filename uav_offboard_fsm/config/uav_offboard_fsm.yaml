uav_offboard_fsm:
  ros__parameters:
    # 起飞目标航点，格式为 [x, y, z, yaw]，单位分别是 m、m、m、rad。
    takeoff_waypoint: [0.0, 0.0, 5.0, 0.0]

    # 返航目标航点，格式为 [x, y, z, yaw]，单位分别是 m、m、m、rad。
    home_waypoint: [0.0, 0.0, 5.0, 0.0]

    # 前往任务区航点序列，格式是 [x, y, z, yaw, x, y, z, yaw, ...]。
    transit_waypoints: [
      0.0, 0.0, 5.0, 0.0,
      5.0, 0.0, 5.0, 0.0,
      5.0, 5.0, 5.0, 1.57079632679
    ]

    # false: 使用完整流程，WAIT_TASK_ENABLE_AUTH 后进入 UAV_START。
    # true: SELF_CHECK 完成后收到 WAIT_TASK_ENABLE_AUTH 直接进入 UAV_HOLD，用于跳过起飞/搜索/接近/采样微调流程。
    direct_to_uav_hold_after_self_check: true

    # UAV_HOLD 内 whole_body_planner 的 UAV 期望位姿持续调整。
    # 输入 topic: /whole_body_planner/uav_setpoint (px4_msgs/TrajectorySetpoint)。
    # position 为 PX4 local NED 绝对坐标；FSM 内部转换为 ENU-relative 后下发给 Ruckig。
    # 未控制的位置轴允许填 NaN；仅更新 yaw 时也可将全部 position 填为 NaN。
    # xy/z/yaw 可独立开启；yaw 输入按 NED 定义，FSM 转为 ENU 后交给 Ruckig。
    use_xy_adjust: true
    use_z_adjust: false
    use_yaw_adjust: true

    # UAV 期望 setpoint 新鲜度超时，单位 s。
    hold_adjust_pos_des_timeout_s: 0.2

    # 实时 setpoint 下发最小周期，单位 s。0.0 表示不额外节流，按 FSM 控制循环消费最新 setpoint。
    # 避免设成与 50ms 控制周期完全相同；timer 抖动到 49.x ms 时会被过滤，实际变成约 10Hz。
    hold_adjust_min_update_period_s: 0.0

    # 目标变化小于该阈值时不重新下发，抑制高频 setpoint 抖动，单位 m。
    hold_adjust_target_update_tolerance_m: 0.00


    # 单次下发目标相对当前 Ruckig 参考点的最大步长；<=0 表示关闭该轴限幅，单位 m。
    # max velocity 也会限制实际步长; max_velocity_xy = 0.2m/s, update_period = 0.05s 时，最大步长约为 0.01m。
    hold_adjust_max_xy_step_m: 0.25
    hold_adjust_max_z_step_m: 0.25

    # UAV_HOLD 调整段 Ruckig 平动速度上限；分量 <=0 表示沿用全局默认。
    hold_adjust_max_velocity_xyz: [0.2, 0.2, 0.1]

    # 外部任务状态中表示允许执行任务的字符串。
    mission_state_enabled_aliases: ["ENABLED", "RUNNING", "AUTO"]

    # 外部任务状态中表示禁止/中止任务的字符串。
    mission_state_disabled_aliases: ["DISABLED", "ABORT", "STOP"]
